name: Canvas to Notion Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "tools/notion_assignment_sync.py"
      - ".github/workflows/canvas-to-notion-sync.yml"

permissions:
  contents: read

concurrency:
  group: canvas-to-notion-sync
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Syntax check
        run: python -m py_compile tools/notion_assignment_sync.py && echo "Syntax OK"

      - name: Lint
        run: ruff check tools/notion_assignment_sync.py

      - name: Smoke test (--help)
        run: python tools/notion_assignment_sync.py --help

  sync:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate secrets
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${NOTION_TOKEN}"
          test -n "${NOTION_DATABASE_ID}"
          test -n "${CANVAS_API_TOKEN}"

      - name: Sync assignments
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
        run: |
          set -euo pipefail
          python tools/notion_assignment_sync.py sync-canvas
